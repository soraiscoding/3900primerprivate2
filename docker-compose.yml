services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: marksuser
      POSTGRES_PASSWORD: markspass
      POSTGRES_DB: marksdb
    # Pre-seed script is required as a volume to load mock database
    # Data inside the container is lost on restart unless you persist it with a volume.
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - my_db_volume:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      #DB_PORT: 5432
      DB_USER: marksuser
      DB_PASSWORD: markspass
      DB_NAME: marksdb
    ports: 
      - "5000:5000"
    depends_on:
      - db

  frontend:
    # TODO: you will need to add to this
    build: ./frontend
    ports: 
      - "8080:80"
    depends_on:
      - backend

  automark:
    build: ./automark
    depends_on:
      - backend
      - db
    profiles:
      - debug

volumes:
  my_db_volume:
  